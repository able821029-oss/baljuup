name: PR Label

# 변경 파일 경로 기반 자동 라벨링 (.github/labeler.yml 규칙 사용)
# 새 push 마다 라벨 재계산 — 영역이 줄어들면 라벨도 자동 제거.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: 라벨 적용
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true   # 더 이상 매칭되지 않는 라벨 자동 제거
