name: Weekly Prediction Rescore

# 매주 화요일 03:00 KST = 월요일 18:00 UTC 자동 실행
# (weekly-collect 가 월요일 06:00 KST 에 끝난 후 21시간 뒤 → 새 데이터로 점수 재계산)
#
# lib/prediction.ts 의 알고리즘이 그대로일 때도 새로 수집된 단지가 있으면
# prediction_score 가 업데이트되어야 정렬/필터가 정확해진다.

on:
  schedule:
    - cron: '0 18 * * 1'  # 매주 월요일 18:00 UTC = 화요일 03:00 KST
  workflow_dispatch:
    inputs:
      limit:
        description: '처리할 단지 수 제한 (비우면 전체, 디버깅 시 100 등 권장)'
        required: false
        default: ''
      dry_run:
        description: 'dry-run (DB 변경 없이 계산만)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  rescore:
    name: 예측 점수 재계산
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: waterproof-app

    steps:
      - name: 체크아웃
        uses: actions/checkout@v6

      - name: Node.js 22 설치
        # @supabase/realtime-js 가 native WebSocket 을 요구해 Node 22+ 필수
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: waterproof-app/package-lock.json

      - name: 의존성 설치
        run: npm ci --no-audit --no-fund

      - name: 점수 재계산
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit=${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          npx tsx scripts/rescore.ts $ARGS

      - name: 실행 요약
        if: always()
        run: |
          echo "### 점수 재계산 결과" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 상태: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 실행 시각: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')" >> "$GITHUB_STEP_SUMMARY"
          echo "- 트리거: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 모드: ${{ github.event.inputs.dry_run == 'true' && 'dry-run' || 'write' }}" >> "$GITHUB_STEP_SUMMARY"

  notify-failure:
    name: 실패 알림 (정기 실행 한정)
    needs: rescore
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Slack 알림 (SLACK_WEBHOOK_URL 시크릿 설정 시)
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            --data "{
              \"text\": \"⚠️ 발주Up 주간 점수 재계산 실패\",
              \"blocks\": [
                { \"type\": \"section\", \"text\": { \"type\": \"mrkdwn\", \"text\": \"*발주Up 주간 점수 재계산 실패*\\nrescore.ts 의 SQL 또는 알고리즘 에러 가능성. 로그 확인.\" }},
                { \"type\": \"actions\", \"elements\": [
                  { \"type\": \"button\", \"text\": { \"type\": \"plain_text\", \"text\": \"로그 보기\" },
                    \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\" }
                ]}
              ]
            }" \
            "$SLACK_WEBHOOK_URL"
